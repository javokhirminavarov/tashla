<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>TASHLA</title>
    <meta name="version" content="2026-03-09b" />
    <link rel="icon" href="data:,">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      ::-webkit-scrollbar { display: none; }
      body { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  </head>
  <body>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.getElementById('root').innerHTML =
          '<div style="padding:20px;color:#EF4444;font-family:sans-serif;background:#122017;min-height:100vh;">' +
          '<h3 style="color:#F1F5F2;margin-bottom:8px;">TASHLA Error</h3>' +
          '<p>' + msg + '</p>' +
          '<p style="font-size:12px;color:#5C716A;margin-top:8px;">' + (src||'') + ':' + (line||'') + '</p>' +
          '</div>';
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('root').innerHTML =
          '<div style="padding:20px;color:#EF4444;font-family:sans-serif;background:#122017;min-height:100vh;">' +
          '<h3 style="color:#F1F5F2;margin-bottom:8px;">TASHLA Error</h3>' +
          '<p>' + (e.reason && e.reason.message || e.reason || 'Unknown error') + '</p>' +
          '</div>';
      });
    </script>
    <div id="root">
      <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#122017;">
        <p style="color:#94A3A1;font-family:sans-serif;font-size:14px;">TASHLA yuklanmoqda...</p>
        <p style="color:#5C716A;font-family:sans-serif;font-size:11px;margin-top:8px;" id="load-status">JS yuklanmoqda...</p>
      </div>
    </div>
    <script>
      // Telegram Mini App v6.1+ injects tgWebAppData into the URL hash
      // (e.g. #tgWebAppData=query_id%3D...). HashRouter interprets the hash
      // as the route path, so we strip these params before React loads,
      // otherwise no route matches and the page renders blank.
      (function() {
        var h = window.location.hash;
        if (h && (h.indexOf('tgWebAppData') !== -1 || h.indexOf('tgWebAppVersion') !== -1)) {
          history.replaceState(null, '', window.location.pathname + window.location.search + '#');
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
